name: All Contributors

on:
  push:
    branches: [main]
  pull_request_target:
    types: [closed]

jobs:
  add-contributor:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check if contributor exists
        id: check
        run: |
          CONTRIBUTOR="${{ github.event.pull_request.user.login }}"
          if grep -q "\"login\": \"$CONTRIBUTOR\"" .all-contributorsrc; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "contributor=$CONTRIBUTOR" >> $GITHUB_OUTPUT
          fi

      - name: Add contributor
        if: steps.check.outputs.exists == 'false'
        uses: all-contributors/all-contributors-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          contributor_key: ${{ steps.check.outputs.contributor }}
          contribution_type: code
