name: Publish Release Images

on:
  push:
    tags:
      - "dashboard-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to build (e.g. dashboard-v0.1.50)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish-by-platform:
    name: Build ${{ matrix.service }} (${{ matrix.suffix }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: dashboard
            image: ghcr.io/${{ github.repository }}/dashboard
            context: ./dashboard
            file: ./dashboard/Dockerfile
            needs_dashboard_version: true
            platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - service: dashboard
            image: ghcr.io/${{ github.repository }}/dashboard
            context: ./dashboard
            file: ./dashboard/Dockerfile
            needs_dashboard_version: true
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - service: perplexity-sidecar
            image: ghcr.io/${{ github.repository }}/perplexity-sidecar
            context: ./perplexity-sidecar
            file: ./perplexity-sidecar/Dockerfile
            needs_dashboard_version: false
            platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - service: perplexity-sidecar
            image: ghcr.io/${{ github.repository }}/perplexity-sidecar
            context: ./perplexity-sidecar
            file: ./perplexity-sidecar/Dockerfile
            needs_dashboard_version: false
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag_name) }}

      - name: Resolve tag metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.tag_name }}"
          fi
          VERSION=$(echo "$TAG" | sed 's/^.*v//')
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          build-args: ${{ matrix.needs_dashboard_version && format('DASHBOARD_VERSION={0}', steps.version.outputs.tag_name) || '' }}
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          rm -rf /tmp/digests
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.service }}-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-platform-images:
    name: Publish ${{ matrix.service }} manifest
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: dashboard
            image: ghcr.io/${{ github.repository }}/dashboard
          - service: perplexity-sidecar
            image: ghcr.io/${{ github.repository }}/perplexity-sidecar
    runs-on: ubuntu-latest
    needs: build-and-publish-by-platform
    if: ${{ needs.build-and-publish-by-platform.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag_name) }}

      - name: Resolve tag metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.tag_name }}"
          fi
          VERSION=$(echo "$TAG" | sed 's/^.*v//')
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.service }}-*
          merge-multiple: true

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        working-directory: /tmp/digests
        run: |
          TAGS="-t ${{ matrix.image }}:${{ steps.version.outputs.version }} -t ${{ matrix.image }}:sha-${{ steps.version.outputs.tag_sha }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAGS="$TAGS -t ${{ matrix.image }}:latest"
          fi
          SOURCES=""
          for digest in *; do
            SOURCES="$SOURCES ${{ matrix.image }}@sha256:$digest"
          done
          docker buildx imagetools create $TAGS $SOURCES

  update-version-json:
    name: Update version metadata
    runs-on: ubuntu-latest
    needs: merge-platform-images
    if: ${{ needs.merge-platform-images.result == 'success' && github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Resolve tag metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.event.inputs.tag_name }}"
          fi
          VERSION=$(echo "$TAG" | sed 's/^.*v//')
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update version.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          RELEASE_NOTES=$(gh release view "${TAG_NAME}" --json body -q .body 2>/dev/null | head -c 2000 || echo "")
          jq -n \
            --arg version "${VERSION}" \
            --arg tag "${TAG_NAME}" \
            --arg url "${RELEASE_URL}" \
            --arg notes "${RELEASE_NOTES}" \
            '{version: $version, tag: $tag, releaseUrl: $url, releaseNotes: $notes}' \
            > version.json

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update version.json for ${{ steps.version.outputs.version }}"
          git push
