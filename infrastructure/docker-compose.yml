# Legacy wrapper for production entrypoints that still run from infrastructure/.
# The repository-root docker-compose.yml remains the sole production source of truth.
# This wrapper only forwards to ../docker-compose.yml so callers keep the historical
# infrastructure/ working directory, env-file location, and relative operator mental model.
# Requires Docker Compose v2 with `include` support; older Compose implementations cannot parse
# this wrapper and should invoke the repository-root docker-compose.yml directly instead.

include:
  - ../docker-compose.yml
